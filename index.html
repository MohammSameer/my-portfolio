document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

er\">\n    <div data-reveal=\"\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;color:#2136e0;margin-bottom:26px\">( 06 ) \u2014 LET'S BUILD<\u002Fdiv>\n    <h2 data-mask=\"\" class=\"om-hero-h1\" style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:104px;line-height:.92;letter-spacing:-.04em;margin:0 0 32px\">Have a project<br>in mind?<\u002Fh2>\n    <a href=\"mailto:sameermunthaj@gmail.com\" data-mag=\"\" style=\"display:inline-flex;align-items:center;gap:12px;padding:18px 34px;background:#2136e0;color:#f3efe6;border-radius:100px;font-weight:600;font-size:17px;margin-bottom:56px\">sameermunthaj@gmail.com <span style=\"font-family:'JetBrains Mono',monospace\">\u2192<\u002Fspan><\u002Fa>\n\n    <div data-reveal=\"\" data-delay=\"140\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-bottom:70px\">\n      <a href=\"https://github.com/MohammSameer\" target=\"_blank\" data-mag=\"\" style=\"display:inline-flex;align-items:center;gap:9px;padding:12px 20px;border:1px solid #ded6c6;border-radius:100px;color:#17150f;font-size:14.5px\">GitHub \u2197<\u002Fa>\n      <a href=\"https://linkedin.com/in/md-sameer123\" target=\"_blank\" data-mag=\"\" style=\"display:inline-flex;align-items:center;gap:9px;padding:12px 20px;border:1px solid #ded6c6;border-radius:100px;color:#17150f;font-size:14.5px\">LinkedIn \u2197<\u002Fa>\n      <a href=\"tel:+919618802750\" data-mag=\"\" style=\"display:inline-flex;align-items:center;gap:9px;padding:12px 20px;border:1px solid #ded6c6;border-radius:100px;color:#17150f;font-size:14.5px\">+91 96188 02750<\u002Fa>\n      <a href=\"uploads/cv.pdf\" target=\"_blank\" data-mag=\"\" style=\"display:inline-flex;align-items:center;gap:9px;padding:12px 20px;border:1px solid #ded6c6;border-radius:100px;color:#17150f;font-size:14.5px\">R\u00e9sum\u00e9 \u2193<\u002Fa>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;padding-top:26px;border-top:1px solid #e8e1d3;font-family:'JetBrains Mono',monospace;font-size:12px;color:#9c9686\">\n      <span>\u00a9 2026 Mohammad Sameer<\u002Fspan>\n      <span>Built end-to-end, like everything else.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<x-import component-from-global-scope=\"image-slot\" from=\"75733be4-92ce-45d4-be99-683cdd1e2b71#/image-slot.js\" hint-size=\"0,0\"><\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      progressRef: (el) => { this._progress = el; },\n      navRef: (el) => { this._nav = el; },\n      canvasRef: (el) => { this._canvas = el; },\n      nameRef: (el) => { this._name = el; },\n      skillsGridRef: (el) => { this._skills = el; },\n      projGridRef: (el) => { this._projGrid = el; },\n      timelineRef: (el) => { this._timeline = el; },\n      certsRef: (el) => { this._certs = el; },\n    };\n  }\n\n  componentDidMount() {\n    this.buildSkills();\n    this.buildProjects();\n    this.buildTimeline();\n    this.buildCerts();\n    this.setupReveal();\n    this.setupScroll();\n    this.setupCounters();\n    this.setupCursor();\n    this.setupMagnetic();\n    this.setupTilt();\n    this.setupNameReveal();\n    this.setupCanvas();\n    this.setupSmooth();\n    this.setupMask();\n  }\n\n  setupNameReveal() {\n    if (!this._name) return;\n    const letters = this._name.querySelectorAll(\".om-letter\");\n    letters.forEach((l, i) => {\n      setTimeout(() => { l.style.opacity = 1; l.style.transform = \"none\"; }, 250 + i * 55);\n    });\n  }\n\n  setupCanvas() {\n    const cv = this._canvas;\n    if (!cv) return;\n    const ctx = cv.getContext(\"2d\");\n    let w, h, dpr, dots = [], mouse = { x: -9999, y: -9999 };\n    const GAP = 40, R = 130;\n    const resize = () => {\n      const rect = cv.parentElement.getBoundingClientRect();\n      dpr = Math.min(window.devicePixelRatio || 1, 2);\n      w = rect.width; h = rect.height;\n      cv.width = w * dpr; cv.height = h * dpr;\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      dots = [];\n      for (let y = GAP/2; y < h; y += GAP) for (let x = GAP/2; x < w; x += GAP) dots.push({ x, y, ox: x, oy: y });\n    };\n    resize();\n    window.addEventListener(\"resize\", resize);\n    cv.parentElement.addEventListener(\"mousemove\", (e) => {\n      const rect = cv.getBoundingClientRect();\n      mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top;\n    });\n    cv.parentElement.addEventListener(\"mouseleave\", () => { mouse.x = -9999; mouse.y = -9999; });\n    const draw = () => {\n      ctx.clearRect(0, 0, w, h);\n      for (const d of dots) {\n        const dx = d.ox - mouse.x, dy = d.oy - mouse.y;\n        const dist = Math.hypot(dx, dy);\n        let tx = d.ox, ty = d.oy, r = 1.1, alpha = 0.16, glow = 0;\n        if (dist < R) {\n          const f = (1 - dist / R);\n          const push = f * 26;\n          const ang = Math.atan2(dy, dx);\n          tx = d.ox + Math.cos(ang) * push;\n          ty = d.oy + Math.sin(ang) * push;\n          r = 1.1 + f * 3.2;\n          alpha = 0.16 + f * 0.84;\n          glow = f;\n        }\n        d.x += (tx - d.x) * 0.14; d.y += (ty - d.y) * 0.14;\n        ctx.beginPath();\n        ctx.arc(d.x, d.y, r, 0, Math.PI * 2);\n        if (glow > 0.02) { ctx.fillStyle = `rgba(33,54,224,${alpha})`; ctx.shadowColor = \"rgba(33,54,224,.8)\"; ctx.shadowBlur = glow * 12; }\n        else { ctx.fillStyle = `rgba(90,86,76,${alpha})`; ctx.shadowBlur = 0; }\n        ctx.fill();\n      }\n      ctx.shadowBlur = 0;\n      requestAnimationFrame(draw);\n    };\n    draw();\n  }\n\n  buildSkills() {\n    if (!this._skills) return;\n    const groups = [\n      [\"Languages\", [[\"JavaScript\",\"javascript\"],[\"TypeScript\",\"typescript\"],[\"Java\",\"openjdk\"]]],\n      [\"Frontend\", [[\"React\",\"react\"],[\"Next.js\",\"nextdotjs\"],[\"Redux\",\"redux\"],[\"HTML5\",\"html5\"],[\"CSS3\",\"css\"]]],\n      [\"Backend\", [[\"Node.js\",\"nodedotjs\"],[\"NestJS\",\"nestjs\"],[\"Express\",\"express\"]]],\n      [\"Databases\", [[\"PostgreSQL\",\"postgresql\"],[\"MongoDB\",\"mongodb\"],[\"MySQL\",\"mysql\"],[\"Prisma\",\"prisma\"]]],\n      [\"Cloud & Tools\", [[\"AWS\",\"https://cdn.jsdelivr.net/gh/devicons/devicon/icons/amazonwebservices/amazonwebservices-original-wordmark.svg\"],[\"Docker\",\"docker\"],[\"Git\",\"git\"],[\"Bitbucket\",\"bitbucket\"],[\"Swagger\",\"swagger\"]]],\n    ];\n    const chips = [\n      [\"Architecture\", [\"REST APIs\",\"Microservices\",\"WebSockets\",\"gRPC\",\"CI/CD\"]],\n      [\"Auth & Security\", [\"JWT\",\"Passport.js\",\"Better Auth\",\"OTP Auth\",\"RBAC\",\"OAuth 2.0\"]],\n      [\"Integrations & AI\", [\"SendGrid\",\"SMTP\",\"Google Meet API\",\"Claude Code\",\"Cursor\"]],\n    ];\n    const label = (t) => `<div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.16em;color:#2136e0;text-transform:uppercase;padding-top:8px\">${t}<\u002Fdiv>`;\n    const logoRow = (g) => `\n      <div class=\"om-two\" style=\"display:grid;grid-template-columns:200px 1fr;gap:44px;padding:36px 0;border-top:1px solid #ddd5c4\">\n        ${label(g[0])}\n        <div style=\"display:flex;flex-wrap:wrap;gap:18px\">\n          ${g[1].map(([name, slug]) => { const wm = slug.indexOf('wordmark') > -1; const isUrl = slug.indexOf('http') === 0; const key = isUrl ? 'aws' : slug; const url = isUrl ? slug : 'https://cdn.simpleicons.org/' + slug; const src = (window.__resources && window.__resources[key]) || url; return `\n            <div class=\"om-logo\" style=\"display:flex;flex-direction:column;align-items:center;gap:11px;width:82px;cursor:default\">\n ectorAll(\".om-chip\").forEach(c => {\n      c.addEventListener(\"mouseenter\", () => { c.style.borderColor = \"#2136e0\"; c.style.color = \"#2136e0\"; c.style.background = \"rgba(33,54,224,.06)\"; });\n      c.addEventListener(\"mouseleave\", () => { c.style.borderColor = \"#d9d1bf\"; c.style.color = \"#5a564c\"; c.style.background = \"#fff\"; });\n    });\n  }\n\n  buildProjects() {\n    if (!this._projGrid) return;\n    const SECTIONS = [\"Overview\", \"Features\", \"Tech Stack\", \"Screenshots\"];\n    const projs = [\n      {\n        name: \"HRMS Platform\", tag: \"hrms-india\", url: \"hrms.local / dashboard\",\n        shot: \"hrms-shot\", ph: \"Drop an HRMS dashboard screenshot\",\n        overview: \"A multi-tenant HRMS SaaS for the Indian market \u2014 the full hire-to-retire lifecycle in one platform. 13 domain modules, 163 data models, 615 API endpoints, and tenant isolation enforced twice over: Postgres row-level security plus a request-scoped tenant context. Team-built; the modules below are the ones I owned.\",\n        features: [\n          \"<b>Role-based access control, end to end<\u002Fb> \u2014 26 roles and a 43-key permission catalogue gating both the API guards and the web navigation, so what a user can see never diverges from what they may do. Backed by a per-role Playwright suite.\",\n          \"<b>ATS &amp; recruiting<\u002Fb> \u2014 requisitions with approver routing, candidate pipelines, interview rounds scheduled through the Google Calendar API, and scorecards.\",\n          \"<b>Offer letters &amp; LOI<\u002Fb> \u2014 PDF letter generation with auto-detected template fields, CTC-band enforcement, and offer revisions.\",\n          \"<b>Onboarding<\u002Fb> \u2014 pre-offer documents and consents carried into the onboarding pack, plus a first-login document-upload gate.\",\n          \"<b>Payroll<\u002Fb> \u2014 salary-structure templates and the employee salary-revision flow, FBP, NPS, perquisites and Form-12BB/16.\",\n          \"<b>Attendance<\u002Fb> \u2014 employee attendance calendar, shift-assignment roster, and the clock-state and punch UX (GPS-geofenced server-side).\",\n        ],\n        stack: [\"TypeScript\", \"NestJS 11\", \"Prisma 6\", \"PostgreSQL 16\", \"Next.js 15\", \"React 19\", \"Temporal\", \"Tailwind v4\", \"TanStack Query\", \"AWS S3\", \"Playwright\", \"Vitest\", \"Turborepo\"],\n      },\n      {\n        name: \"Solis Insurify\", tag: \"solisinsurifyimf\", url: \"insurify.local / ops\",\n        shot: \"pv-insurify\", ph: \"Drop a Solis Insurify screenshot\",\n        overview: \"An insurance marketing-firm platform: 13 backend microservices behind five portals \u2014 Admin, Agent, Relationship Manager, Ops and HR \u2014 on an Nx monorepo with a database-per-service (185 models across 13 schemas), gRPC between services and an event-driven backbone. Team-built; I built the Operations service and the surfaces that run on it, working mainly across the Ops and RM portals.\",\n        features: [\n          \"<b>Built the Operations service<\u002Fb> \u2014 KYC, claims and SLA tracking, then owned it through months of iteration.\",\n          \"<b>Agent &amp; customer KYC, end to end<\u002Fb> \u2014 document routing, in-browser PDF review, OCR extraction (AWS Textract), reviewer auto-assignment with a fairness rule, and a POSP agreement e-signature step.\",\n          \"<b>DigiLocker identity verification<\u002Fb> integrated via Cashfree, with webhook handling.\",\n          \"<b>Real-time support ticketing<\u002Fb> \u2014 WebSocket chat, attachments, category routing, and an escalation chain from ops executive \u2192 ops manager \u2192 super-admin.\",\n          \"<b>Contest &amp; leaderboard module<\u002Fb> \u2014 admin CRUD, RM contest UI, territory auto-assignment and a scheduler service.\",\n          \"<b>Offline policy issuance<\u002Fb> with OCR-prefilled forms, and the activity-service (schema, domain events and timeline) from scratch.\",\n        ],\n        stack: [\"TypeScript\", \"NestJS 11\", \"Fastify\", \"Nx\", \"Prisma 6\", \"PostgreSQL\", \"Next.js 16\", \"React 19\", \"gRPC\", \"Temporal\", \"EventBridge\", \"Socket.IO\", \"Redis\", \"OpenSearch\", \"OPA\", \"AWS S3 \u00b7 SES \u00b7 Textract\", \"Terraform \u00b7 EKS\"],\n      },\n      {\n        name: \"Aurum Conexus\", tag: \"aurum-conexus\", url: \"aurum.local / members\",\n        shot: \"pv-aurum\", ph: \"Drop an Aurum Conexus screenshot\",\n        overview: \"A luxury member management platform. Integrating the Google Meet Calendar API cut scheduling effort by 50%.\",\n        features: [\n          \"Member management for a luxury clientele\",\n          \"Google Meet Calendar API integration for scheduling\",\n          \"Cut scheduling effort by 50%\",\n        ],\n        stack: [\"NestJS\", \"MongoDB\", \"Google APIs\"],\n      },\n      {\n        name: \"Sugam Form Filler\", tag: \"sugam-form-filler\", url: \"127.0.0.1:8000 / sugam\",\n        shot: \"pv-sugam\", ph: \"Drop a Sugam Form Filler screenshot\",\n        overview: \"Official paperwork in India shuts people out: one wrong field and the application is rejected, and the form is rarely in a language the applicant is comfortable in. Sugam is a vision-enabled, multilingual agent that reads a photo of the form, explains every field in the user's own language, walks them through it one question at a time, and produces a real filled PDF \u2014 all behind a security checkpoint that masks PII and blocks prompt injection. Google ADK multi-agent on Gemini 2.5 Flash, an MCP server for the domain tools, and a purpose-built React UI served from the same process.\",\n        features: [\n          \"<b>Multi-agent orchestration on Google ADK<\u002Fb> \u2014 an orchestrator delegates to form_reader (vision) and data_collector (conversational Q&amp;A) via transfer_to_agent, so the sub-agent inherits the full session history and can actually see the uploaded document.\",\n          \"<b>A security checkpoint on every model call<\u002Fb> \u2014 a before_model_callback on all three agents masks Aadhaar, PAN and bank numbers before Gemini ever sees them, blocks prompt injection and consent refusal, and writes a JSON audit log.\",\n          \"<b>MCP server with real domain tools<\u002Fb> \u2014 parse_form_fields, lookup_govt_scheme and generate_filled_pdf over stdio; the agent fills the user's own uploaded PDF, via AcroForm fields when they exist and a vision-derived coordinate overlay when they do not, then returns it as an inline preview in the chat rather than a file path.\",\n          \"<b>Self-healing knowledge base<\u002Fb> \u2014 anything missing from the curated seed catalog is researched live with Google Search grounding, cited, and cached to disk, so the catalog is a fast path rather than a limit.\",\n          \"<b>Ten Indian languages, first-class<\u002Fb> \u2014 each shown in its own script, Urdu right-to-left, with voice input and read-aloud that falls back to Gemini TTS for the languages no browser can speak.\",\n          \"<b>A live Trust panel<\u002Fb> \u2014 masking runs before the model call and blocking runs instead of it, so neither reaches the event stream; an in-memory bus mirrors both so the person being protected can watch it happen.\",\n        ],\n        stack: [\"Python 3.11\", \"Google ADK 2\", \"Gemini 2.5 Flash\", \"MCP\", \"FastAPI\", \"React 19\", \"TypeScript\", \"Vite\", \"Tailwind v4\", \"Radix\", \"fpdf2 \u00b7 pypdf \u00b7 PyMuPDF\", \"uv\", \"pytest\"],\n      },\n    ];\n\n    const chip = (t) => `<span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;padding:6px 11px;border:1px solid #ded6c6;border-radius:6px;color:#6f6b60\">${t}<\u002Fspan>`;\n    const bullet = (t) => `<div style=\"display:flex;gap:12px;font-size:14.5px;color:#3a3830;line-height:1.62;margin-bottom:13px\"><span style=\"color:#2136e0;flex-shrink:0\">\u2192<\u002Fspan><span>${t}<\u002Fspan><\u002Fdiv>`;\n\n    const panel = (p, s) => {\n      if (s == for sections<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"pc-drawer\" style=\"position:absolute;inset:0;background:rgba(10,8,5,.975);transform:translateX(-100%);transition:transform .5s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;justify-content:center;padding:26px\">\n              ${SECTIONS.map((s, j) => `\n                <button class=\"pc-item\" data-sec=\"${j}\" style=\"text-align:left;background:none;border:none;border-bottom:1px solid rgba(255,255,255,.07);padding:15px 4px;cursor:pointer;display:flex;align-items:center;gap:14px;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:20px;letter-spacing:-.01em;color:${j === 0 ? \"#ffffff\" : \"#8d897e\"};transition:color .3s,padding .35s cubic-bezier(.16,1,.3,1)\">\n                  <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#2136e0\">0${j + 1}<\u002Fspan>${s}\n                <\u002Fbutton>`).join(\"\")}\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:42px 44px;display:flex;flex-direction:column\">\n            <div class=\"pc-label\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;color:#2136e0;margin-bottom:20px\">OVERVIEW<\u002Fdiv>\n            ${SECTIONS.map((s, j) => `<div class=\"pc-panel\" data-panel=\"${j}\" style=\"display:${j === 0 ? \"block\" : \"none\"}\">${panel(p, s)}<\u002Fdiv>`).join(\"\")}\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>`).join(\"\");\n\n    this._projGrid.querySelectorAll(\".proj-card\").forEach(card => {\n      const burger = card.querySelector(\".pc-burger\");\n      const drawer = card.querySelector(\".pc-drawer\");\n      const bars = [...card.querySelectorAll(\".pc-bar\")];\n      const items = [...card.querySelectorAll(\".pc-item\")];\n      const panels = [...card.querySelectorAll(\".pc-panel\")];\n      const label = card.querySelector(\".pc-label\");\n      let open = false, active = 0;\n\n      const toggle = (o) => {\n        open = o;\n        drawer.style.transform = o ? \"translateX(0)\" : \"translateX(-100%)\";\n        burger.setAttribute(\"aria-expanded\", o ? \"true\" : \"false\");\n        bars[0].style.transform = o ? \"translateY(5.6px) rotate(45deg)\" : \"none\";\n        bars[1].style.opacity = o ? \"0\" : \"1\";\n        bars[2].style.transform = o ? \"translateY(-5.6px) rotate(-45deg)\" : \"none\";\n      };\n\n      burger.addEventListener(\"click\", () => toggle(!open));\n      burger.addEventListener(\"mouseenter\", () => { burger.style.background = \"rgba(255,255,255,.14)\"; burger.style.borderColor = \"rgba(255,255,255,.32)\"; });\n      burger.addEventListener(\"mouseleave\", () => { burger.style.background = \"rgba(255,255,255,.06)\"; burger.style.borderColor = \"rgba(255,255,255,.16)\"; });\n\n      items.forEach((it, j) => {\n        it.addEventListener(\"mouseenter\", () => { it.style.color = \"#ffffff\"; it.style.paddingLeft = \"12px\"; });\n        it.addEventListener(\"mouseleave\", () => { it.style.color = j === active ? \"#ffffff\" : \"#8d897e\"; it.style.paddingLeft = \"4px\"; });\n        it.addEventListener(\"click\", () => {\n          active = j;\n          panels.forEach((pn, k) => { pn.style.display = k === j ? \"block\" : \"none\"; });\n          items.forEach((o, k) => { o.style.color = k === j ? \"#ffffff\" : \"#8d897e\"; });\n          label.textContent = SECTIONS[j].toUpperCase();\n          toggle(false);\n        });\n      });\n    });\n  }\n\n  buildTimeline() {\n    if (!this._timeline) return;\n    const items = [\n      [\"Oct 2025 \u2014 Present\",\"Solis Technology Pvt Ltd.\",\"Full Stack Developer\",\"Backend and full-stack engineering on two enterprise platforms: a multi-tenant India HRMS and a 13-microservice insurance distribution platform (Nx monorepo, database-per-service). Owned role-based access control end to end \u2014 26 roles and a 43-key permission catalogue gating both the API guards and the web navigation, with a per-role E2E suite. Built the ATS \u2192 offer-letter \u2192 onboarding pipeline (PDF letter generation, Google Calendar interview scheduling), and the Operations service: agent &amp; customer KYC with AWS Textract OCR and DigiLocker verification, claims, SLA tracking, and real-time WebSocket support ticketing. NestJS \u00b7 Prisma \u00b7 PostgreSQL \u00b7 Next.js \u00b7 Temporal \u00b7 AWS.\", true],\n      [\"Mar 2025 \u2014 Apr 2025\",\"Edunet Foundation - EY GDS & AICTE\",\"Web Development Intern\",\"A 6-week intensive on modern web development \u2014 built and deployed a full-stack MERN application with responsive UI, REST APIs, MongoDB modeling, and React state management.\", false],\n      [\"2021 \u2014 2025\",\"Sri Indu College of Engineering & Technology\",\"B.Tech, Computer Science \u2014 CGPA 7.49\",\"Bachelor of Technology in Computer Science. Foundations in data structures, systems, and software engineering.\", false],\n    ];\n    this._timeline.innerHTML = items.map((it, i) => `\n      <div data-reveal data-delay=\"${i*100}\" style=\"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);display:grid;grid-template-columns:180px 1fr;gap:36px;padding:34px 0;border-top:1px solid #e8e1d3\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#8a8578;padding-top:6px;letter-spacing:.02em\">${it[0]}<\u002Fdiv>\n        <div>\n          <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap\">\n            <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:29px;margin:0;color:#17150f;letter-spacing:-.02em\">${it[1]}<\u002Fh3>\n            ${it[4] ? '<span style=\"width:8px;height:8px;border-radius:50%;background:#2136e0;box-shadow:0 0 9px #2136e0\"><\u002Fspan>' : ''}\n          <\u002Fdiv>\n          <div style=\"font-size:15px;color:#2136e0;margin:6px 0 14px;font-weight:500\">${it[2]}<\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.7;color:#6f6b60;margin:0;max-width:720px\">${it[3]}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>`).join(\"\") + '<div style=\"border-top:1px solid #e8e1d3\"><\u002Fdiv>';\n  }\n\n  buildCerts() {\n    if (!this._certs) return;\n    const certs = [\n      [\"Complete 2024 Web Development Bootcamp\",\"Udemy\",\"https://drive.google.com/file/d/1R8cWi2UFxxwkZPcc4qTzFdU9711ZuqWc/view?usp=drive_link\"],\n      [\"Java Programming Certification\",\"Infosys Springboard\",\"https://drive.google.com/file/d/12u8VWd4aTyqqqIqjXB7MGtkGEYQOtd-P/view?usp=drive_link\"],\n      [\"Software Testing Training\",\"Besant Technologies\",\"https://drive.google.com/file/d/1YU2PUmUXFpa8M0U6X3hcjiwaEos9oaOy/view?usp=drive_link\"],\n      [\"AI/ML & Data Science Workshop\",\"Brain O Vision\",\"\"],\n      [\"Google Cloud Gen AI Academy APAC 2026 \u2013 Cohort 2\",\"Google Cloud \u00b7 Hack2skill\",\"https://drive.google.com/file/d/1Vc7qHBu9qYRZtQbehxAwDCwDFhs_9pne/view?usp=drivesdk\"],\n    ];\n    const CARD = \"opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1),border-color .3s,background .3s;display:flex;align-items:center;gap:20px;padding:28px;border:1px solid #e3dccc;border-radius:16px;background:#ffffff;text-decoration:none;color:inherit\";\n    this._certs.innerHTML = certs.map((c, i) => {\n      const url = c[2];\n      const tag = url ? \"a\" : \"div\";\n      const attrs = url ? ` href=\"${url}\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"View ${c[0]} certificate (opens in a new tab)\"` : \"\";\n      const icon = url ? `<svg class=\"om-cert-ico\" width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2136e0\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;opacity:.4;transition:opacity .3s cubic-bezier(.16,1,.3,1),transform .3s cubic-bezier(.16,1,.3,1)\"><path d=\"M7 17 17 7\"><\u002Fpath><path d=\"M8 7h9v9\"><\u002Fpath><\u002Fsvg>` : \"\";\n      return `\n      <${tag} class=\"om-cert\"${attrs} data-reveal data-delay=\"${(i%2)*90}\" style=\"${CARD}${url ? \";cursor:pointer\" : \"\"}\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#2136e0;flex-shrink:0\">0${i+1}<\u002Fspan>\n        <div style=\"flex:1;min-width:0\">\n          <div style=\"font-size:16.5px;color:#17150f;font-weight:500;line-height:1.35\">${c[0]}<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#8a8578;margin-top:6px\">${c[1]}<\u002Fdiv>\n        <\u002Fdiv>\n        ${icon}\n      <\u002F${tag}>`;\n    }).join(\"\");\n    this._certs.querySelectorAll(\".om-cert\").forEach(c => {\n      const ico = c.querySelector(\".om-cert-ico\");\n      c.addEventListener(\"mouseenter\", () => {\n        c.style.borderColor = \"#c7bca4\"; c.style.background = \"#f5f1e8\";\n        if (ico) { ico.style.opacity = 1; ico.style.transform = \"translate(2px,-2px)\"; }\n      });\n      c.addEventListener(\"mouseleave\", () => {\n        c.style.borderColor = \"#e3dccc\"; c.style.background = \"#ffffff\";\n        if (ico) { ico.style.opacity = .4; ico.style.transform = \"none\"; }\n      });\n    });\n  }\n\n  setupReveal() {\n    const els = document.querySelectorAll(\"[data-reveal]\");\n    if (!(\"IntersectionObserver\" in window)) { els.forEach(e => { e.style.opacity = 1; e.style.transform = \"none\"; }); return; }\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          const el = e.target;\n          const d = parseFloat(el.getAttribute(\"data-delay\") || 0);\n          el.style.transitionDelay = d + \"ms\";\n          el.style.opacity = 1; el.style.transform = \"none\";\n          io.unobserve(el);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: \"0px 0px -6% 0px\" });\n    els.forEach(el => io.observe(el));\n  }\n\n  setupScroll() {\n    const onScroll = () => {\n      const st = window.scrollY || document.documentElement.scrollTop;\n      const hh = document.documentElement.scrollHeight - window.innerHeight;\n      if (this._progress) this._progress.style.width = (hh > 0 ? (st / hh) * 100 : 0) + \"%\";\n      if (this._nav) {\n        if (st > 40) { this._nav.style.background = \"rgba(243,239,230,.82)\"; this._nav.style.backdropFilter = \"blur(12px)\"; this._nav.style.borderColor = \"#e8e1d3\"; this._nav.style.padding = \"14px 40px\"; }\n        else { this._nav.style.background = \"transparent\"; this._nav.style.backdropFilter = \"none\"; this._nav.style.borderColor = \"transparent\"; this._nav.style.padding = \"20px 40px\"; }\n      }\n    };\n    window.addEventListener(\"scroll\", onScroll, { passive: true });\n    onScroll();\n  }\n\n  setupCounters() {\n    const nums = document.querySelectorAll(\"[data-count]\");\n    const run = (el) => {\n      const target = parseFloat(el.getAttribute(\"data-count\"));\n      const dur = 1500, start = performance.now();\n      const tick = (now) => {\n        const p = Math.min((now - start) / dur, 1);\n        const eased = 1 - Math.pow(1 - p, 3);\n        el.textContent = Math.round(target * eased);\n        if (p < 1) requestAnimationFrame(tick);\n      };\n      requestAnimationFrame(tick);\n    };\n    if (!(\"IntersectionObserver\" in window)) { nums.forEach(run); return; }\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => { if (e.isIntersecting) { run(e.target); io.unobserve(e.target); } });\n    }, { threshold: 0.6 });\n    nums.forEach(n => io.observe(n));\n  }\n\n  setupCursor() {\n    if (window.matchMedia(\"(pointer: coarse)\").matches) return;\n    const dot = document.createElement(\"div\");\n    dot.style.cssText = \"position:fixed;top:0;left:0;width:9px;height:9px;border-radius:50%;background:#2136e0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .25s,height .25s,opacity .3s\";\n    const ring = document.createElement(\"div\");\n    ring.style.cssText = \"position:fixed;top:0;left:0;width:38px;height:38px;border:1px solid rgba(33,54,224,.55);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s,opacity .3s;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:#2136e0\";\n    document.body.appendChild(dot); document.body.appendChild(ring);\n    let mx = innerWidth/2, my = innerHeight/2, rx = mx, ry = my;\n    window.addEventListener(\"mousemove\", (e) => { mx = e.clientX; my = e.clientY; dot.style.left = mx+\"px\"; dot.style.top = my+\"px\"; });\n    const loop = () => { rx += (mx-rx)*0.2; ry += (my-ry)*0.2; ring.style.left = rx+\"px\"; ring.style.top = ry+\"px\"; requestAnimationFrame(loop); };\n    loop();\n    document.addEventListener(\"mouseover\", (e) => {\n      const t = e.target.closest(\"a,button,[data-mag],.om-card,.om-chip,[data-cursor]\");\n      if (t) {\n        const label = t.getAttribute(\"data-cursor\");\n        ring.style.width = label ? \"64px\" : \"56px\"; ring.style.height = label ? \"64px\" : \"56px\";\n        ring.style.borderColor = \"rgba(33,54,224,.95)\"; ring.textContent = label || \"\";\n        dot.style.width = \"0px\"; dot.style.height = \"0px\";\n      }\n    });\n    document.addEventListener(\"mouseout\", (e) => {\n      if (e.target.closest(\"a,button,[data-mag],.om-card,.om-chip,[data-cursor]\")) {\n        ring.style.width = \"38px\"; ring.style.height = \"38px\"; ring.style.borderColor = \"rgba(33,54,224,.55)\"; ring.textContent = \"\";\n        dot.style.width = \"9px\"; dot.style.height = \"9px\";\n      }\n    });\n    document.addEventListener(\"mouseleave\", () => { dot.style.opacity = 0; ring.style.opacity = 0; });\n    document.addEventListener(\"mouseenter\", () => { dot.style.opacity = 1; ring.style.opacity = 1; });\n  }\n\n  setupMagnetic() {\n    document.querySelectorAll(\"[data-mag]\").forEach(el => {\n      el.style.transition = \"transform .25s cubic-bezier(.16,1,.3,1)\";\n      el.addEventListener(\"mousemove\", (e) => {\n        const r = el.getBoundingClientRect();\n        const x = e.clientX - (r.left + r.width/2);\n        const y = e.clientY - (r.top + r.height/2);\n        el.style.transform = `translate(${x*0.28}px,${y*0.34}px)`;\n      });\n      el.addEventListener(\"mouseleave\", () => { el.style.transform = \"translate(0,0)\"; });\n    });\n  }\n\n  setupSmooth() {\n    if (typeof Lenis === \"undefined\") return;\n    const lenis = new Lenis({ duration: 1.1, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), smoothWheel: true });\n    const raf = (time) => { lenis.raf(time); requestAnimationFrame(raf); };\n    requestAnimationFrame(raf);\n    this._lenis = lenis;\n    document.querySelectorAll('a[href^=\"#\"]').forEach(a => {\n      a.addEventListener(\"click\", (e) => {\n        const id = a.getAttribute(\"href\");\n        if (id.length > 1) { const t = document.querySelector(id); if (t) { e.preventDefault(); lenis.scrollTo(t, { offset: -10 }); } }\n      });\n    });\n  }\n\n  setupMask() {\n    const els = document.querySelectorAll(\"[data-mask]\");\n    if (!els.length) return;\n    const io = (\"IntersectionObserver\" in window) ? new IntersectionObserver((ents) => {\n      ents.forEach(e => { if (e.isIntersecting) { if (e.target.__mask) e.target.__mask.style.transform = \"none\"; io.unobserve(e.target); } });\n    }, { threshold: 0.2, rootMargin: \"0px 0px -8% 0px\" }) : null;\n    els.forEach(el => {\n      const inner = document.createElement(\"span\");\n      inner.style.cssText = \"display:block;transform:translateY(115%);transition:transform 1s cubic-bezier(.16,1,.3,1)\";\n      inner.innerHTML = el.innerHTML;\n      inner.addEventListener(\"transitionend\", () => { el.style.overflow = \"visible\"; });\n      el.innerHTML = \"\"; el.appendChild(inner);\n      el.style.overflow = \"hidden\"; el.style.paddingBottom = \"0.08em\";\n      el.__mask = inner;\n      if (io) io.observe(el); else inner.style.transform = \"none\";\n    });\n  }\n\n  setupTilt() {\n    if (window.matchMedia(\"(pointer: coarse)\").matches) return;\n    document.querySelectorAll(\"[data-tilt]\").forEach(el => {\n      el.addEventListener(\"mousemove\", (e) => {\n        const r = el.getBoundingClientRect();\n        const px = (e.clientX - r.left) / r.width - 0.5;\n        const py = (e.clientY - r.top) / r.height - 0.5;\n        el.style.transition = \"transform .08s linear\";\n        el.style.transform = `perspective(900px) rotateY(${px*7}deg) rotateX(${-py*7}deg) translateY(0)`;\n      });\n      el.addEventListener(\"mouseleave\", () => {\n        el.style.transition = \"transform .5s cubic-bezier(.16,1,.3,1)\";\n        el.style.transform = \"perspective(900px) rotateY(0) rotateX(0)\";\n      });\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
